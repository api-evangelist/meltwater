          - count_unique
          - date_histogram
          - measure_statistics
        dimension:
          type: string
          example: language
          description: The dimension to use in a `top_terms` or `count_unique` analytic type. Use the `GET v3/analytics/custom/catalog` endpoint to see what dimensions are available.
        limit:
          type: number
          example: 10
          default: 10
          maximum: 100
          minimum: 1
          description: The limit to the number of terms to return in a `top_terms` analytic type.
        measures:
          type: array
          example:
          - views
          - estimated_views
          description: The measures to use in a `measures_statistics` analytic type. Use the `GET v3/analytics/custom/catalog` endpoint to see what measures are available.
        granularity:
