  /v3/analytics/{searchId}/custom:
    post:
      tags:
      - Listening Analytics
      summary: Create a custom analytics request
      description: 'Create a custom analytics request with your choice of filters and analytic types and configuration.


        Please see example requests/responses below or our guide on Custom Analytics [here](/guides/listening/analyzing-mentions) for more information.'
      parameters:
      - name: searchId
        in: path
        description: The ID of the Saved Search
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomAnalyticsRequest'
            examples:
              Document Count:
                summary: Document Count
                value:
                  start: '2024-01-01T00:00:00'
                  end: '2024-01-10T00:00:00'
                  tz: UTC
                  analysis:
                    type: document_count
              Top Terms:
                summary: Top Terms
                value:
                  start: '2024-01-01T00:00:00'
                  end: '2024-01-10T00:00:00'
                  tz: UTC
                  analysis:
                    type: top_terms
                    dimension: language
              Count Unique:
                summary: Count Unique
                value:
                  start: '2024-01-01T00:00:00'
                  end: '2024-01-10T00:00:00'
                  tz: UTC
                  analysis:
                    type: count_unique
                    dimension: language
              Measure Statistics:
                summary: Measure Statistics
                value:
                  start: '2024-01-01T00:00:00'
                  end: '2024-01-10T00:00:00'
                  tz: UTC
                  analysis:
                    type: measure_statistics
                    measures:
                    - views
              Date Histogram:
                summary: Date Histogram
                value:
                  start: '2024-01-01T00:00:00'
                  end: '2024-01-10T00:00:00'
                  tz: UTC
                  analysis:
                    type: date_histogram
                    granularity: day
              Date Histogram/Top Terms:
                summary: Date Histogram / Top Terms
                value:
                  start: '2024-01-01T00:00:00'
                  end: '2024-01-10T00:00:00'
                  tz: UTC
                  analysis:
                    type: date_histogram
                    granularity: day
                    analysis:
                      type: top_terms
                      dimension: language
              Top Terms/Top Terms:
                summary: Top Terms / Top Terms
                value:
                  start: '2024-01-01T00:00:00'
                  end: '2024-01-10T00:00:00'
                  tz: UTC
                  analysis:
                    type: top_terms
                    dimension: location_country
                    analysis:
                      type: top_terms
                      dimension: language
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomAnalyticsResponse'
              examples:
                Document Count:
                  summary: Document Count
                  value:
                    start: '2024-01-01T00:00:00'
                    end: '2024-01-10T00:00:00'
                    tz: UTC
                    search_id: 987654
                    analysis:
                      type: document_count
                    result:
                      document_count: 123456
                Top Terms:
                  summary: Top Terms
                  value:
                    start: '2024-01-01T00:00:00'
                    end: '2024-01-10T00:00:00'
                    tz: UTC
                    search_id: 987654
