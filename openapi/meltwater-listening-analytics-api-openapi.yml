            E.g. "2024-03-25T00:00:00"'
        end_date:
          type: string
          format: datetime
          example: '2024-03-30T00:00:00'
          description: 'End date (UTC) in ISO 8601 Local standard.

            E.g. "2024-03-30T00:00:00"'
        tz:
          type: string
          example: UTC
        languages:
          type: array
          example:
          - en
          description: "The languages of documents to include in the query.\n\nA primary language subtag from the IANA language tag registry, 'zh-Hant',\n'zh-Hans' or 'zz'.\n\nIn addition to two and three letter primary subtags from the\n[IANA language tag registry](https://www.w3.org/International/articles/language-tags/#language),\nthe following special language codes are also supported:\n\n  * `zh-Hans` - for Simplified Chinese\n  * `zh-Hant` - for Traditional Chinese\n  * `zz` - for unknown language\n\nThis restricts the documents queried to include only those in a\nparticular language.\n\nIf multiple languages are specified, documents in any of those languages\nwill be included in the results."
        countries:
          type: array
          example:
          - gb
          description: 'The origin countries of documents to include in the query.


            The two-letter ISO 3166-1 Alpha-2 country code, or ''ZZ''.


            Besides the two letter [ISO 3166-1 Alpha-2 country code](https://www.iso.org/obp/ui/#search/code/)

            of a country, ''ZZ'' may be used to indicate ''Unknown country of origin''.


            This restricts the documents queried to include only those that

            originated from a particular country.


            If multiple countries are specified, documents that originated from any

            of those countries will be included in results.


            Documents that originated in some countries may be restricted from your

            queries automatically, based on your jurisdiction and entitlements.'
        sources:
          type: array
          example:
          - x
          description: 'The origin sources of documents to include in the query. This restrictsthe documents queried to include only those that originated from these selected sources.


            If multiple sources are selected, documents from any of those sources will be included in the results.


            *Available values*: forums, blogs, douyin, sina_weibo, twitch, facebook, wechat, news, pinterest,x, instagram, little_red_book, bilibili, youku, kakotalk, broadcast and linevoom.'
        sentiments:
          type: array
          example:
          - positive
          description: 'The overall sentiment of the document to filter on.


            If multiple sentiments are specified, documents that match any of the sentiments will be included in the results.


            *Available values*: positive, negative and neutral.'
        analytic:
          $ref: '#/components/schemas/CustomAnalyticsRequestAnalytic'
        keywords:
          type: array
          example:
          - USA
          - UK
          description: List of keywords to filter documents by.
        emojis:
          type: array
          example:
          - 😀
          - 😢
          description: List of emojis to filter documents by.
        custom_categories:
          type: array
          example:
          - '1234'
          - '5678'
          description: List of custom category IDs to filter documents by.
        filter_set:
          type: string
          example: '"4321"'
          description: ID of a filter set to apply.
        author_lists:
          type: array
          example:
          - '1111'
          - '2222'
          description: List of author list IDs to filter documents by.
    Errors:
      required:
      - type
      type: object
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetails'
          description: List of problems with the request
        type:
          type: string
          enum:
          - NotFound
          - ServiceUnavailable
          - Unauthorized
          - ValidationFailed
