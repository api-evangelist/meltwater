          title: An ISO8601 date, excluding time and timezone/offset.
          type: string
          description: 'An ISO8601 date, excluding time and timezone/offset.


            The year, month and day formatted according to ISO8601. The date

            represents the local date at the timezone given in the `tz` parameter.'
          format: date
        document_count:
          type: integer
          format: int64
        hours:
          type: array
          items:
