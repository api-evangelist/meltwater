components:
  schemas:
    RateLimitedError:
      description: RateLimitedError
      example:
        message: Service Overloaded
        errors: {}
      allOf:
      - $ref: '#/components/schemas/Errors'
      - required:
        - message
        type: object
        properties:
          message:
            type: string
        description: RateLimitedError
    Entity:
      required:
      - document_count
      - entity
      - type
      - percentage
      type: object
      properties:
        entity:
          type: string
        type:
          type: string
        document_count:
          type: integer
          format: int64
        percentage:
          type: number
          format: double
      description: Entity
    Sentiments:
      required:
      - negative
      - neutral
      - positive
      - unknown
      type: object
      properties:
        positive:
          $ref: '#/components/schemas/SentimentStats'
        negative:
          $ref: '#/components/schemas/SentimentStats'
        neutral:
          $ref: '#/components/schemas/SentimentStats'
        unknown:
          $ref: '#/components/schemas/SentimentStats'
      description: Sentiments
    Link:
      required:
      - document_count
      - link
      - percentage
      type: object
      properties:
        link:
          type: string
        document_count:
          type: integer
          format: int64
        percentage:
          type: number
          format: double
      description: Link
    TopTopicsResponse:
      required:
      - document_count
      - topics
      type: object
      properties:
        document_count:
          type: integer
          format: int64
        mentions:
          type: array
          items:
            $ref: '#/components/schemas/Topic'
      description: TopTopicsResponse
    AnalyticsTag:
      required:
      - document_count
      - percentage
      - tag
      type: object
      properties:
        tag:
          type: string
        document_count:
          type: integer
          format: int64
        percentage:
          type: number
          format: double
      description: Tag
    Topic:
      required:
      - document_count
      - topic
      - sub_topics
      - percentage
      type: object
      properties:
        topic:
          type: string
        sub_topics:
          type: object
          items:
            $ref: '#/components/schemas/Topic'
        document_count:
          type: integer
          format: int64
        percentage:
          type: number
          format: double
      description: Topic
    Keyphrase:
      required:
      - document_count
