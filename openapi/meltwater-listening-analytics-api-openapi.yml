      description: TopLocationsResponse
    CustomAnalyticsResponse:
      type: object
      properties:
        start_date:
          type: string
          format: datetime
          example: '2024-03-25T00:00:00'
          description: Start date used in the request
        end_date:
          type: string
          format: datetime
          example: '2024-03-30T00:00:00'
          description: End date used in the request
        tz:
          type: string
          example: UTC
          description: Timezone used in the request
        languages:
          type: array
          example:
          - en
          description: Language filters used in the request
        countries:
          type: array
          example:
          - gb
          description: Country filters used in the request
        sources:
          type: array
          example:
          - x
          description: Source filters used in the request
        sentiments:
          type: array
          example:
          - positive
          description: Sentiment filters used in the request
        search_id:
          type: number
          example: 12393
          description: Saved Search ID used in the request
        analytic:
          $ref: '#/components/schemas/CustomAnalyticsRequestAnalytic'
        results:
          type: object
          properties:
            document_count:
              type: number
              example: 12000
              description: Total number of documents that matched the search and filters
            analysis:
              oneOf:
              - type: array
                items:
                  type: object
                  properties:
                    document_count:
                      type: number
                      example: 12345
                      description: Number of documents that are contained in either the `date_histogram` or `top_terms` bucket
                    percentage:
                      type: number
                      example: 30.0
                      description: Percentage of documents compared to the parent bucket. If the analysis has no parent, then the percentage is calculated from the total document count.
                    key:
                      type: string
                      example: EN
                    label:
                      type: string
                      example: English
                      description: Some dimensions will include extra enriched information when used in a `top_terms` analytic type
                    change:
                      type: number
                      example: 357
                      description: Change in number of documents from the previous date histogram timeseries bucket
                    analysis:
                      type: object
                      description: Any nested analysis is contained in the buckets of the parent analysis
                      additionalProperties: {}
                  additionalProperties: {}
              - type: number
                example: 12345
                description: For analytic types (eg. `count_unique`) that don't involve buckets or statistic breakdowns, only the result is returned.
      example:
        start_date: '2024-01-01T00:00:00'
        end_date: '2024-01-10T00:00:00'
        tz: UTC
        analysis:
          type: document_count
        results:
          document_count: 123456
