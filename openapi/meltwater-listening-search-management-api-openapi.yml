          $ref: '#/components/schemas/SearchV2'
      title: Search Resource
      description: Search Resource
      additionalProperties: false
    ValidationMetadata:
      type: object
      title: Metadata
      required:
      - field
      properties:
        validation:
          type: string
          example: complexity
          enum:
          - syntax
          - complexity
          - length
          - cast
          - inclusion
          - required
          - content_type
          description: The cause of the validation error
        field:
          type: string
          example: boolean
          description: Name of the field that failed its validation checks
      description: Metadata for the error
      additionalProperties: true
    MWAPIErrorDetails:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        details:
          type: string
    SingleSearchRequest:
      required:
      - search
      type: object
      properties:
        search:
          $ref: '#/components/schemas/SearchRequestV2'
      title: Search Resource
      description: Search Resource
      additionalProperties: false
    FilterSetList:
