      properties:
        total:
          type: integer
          description: Total count
          format: int64
          example: 901382
      description: Number of results for the search
      title: Count
      additionalProperties: false
    CreateTagResponse:
      type: object
      title: Tag
      example:
        tag:
          id: 123
          name: new-tag
      properties:
        tag:
          $ref: '#/components/schemas/CreateTagResponseConfig'
    SearchRequestV2:
      required:
      - name
      - query
      type: object
      properties:
        name:
          type: string
          description: The name associated with this search
          example: Electric cars
        query:
          $ref: '#/components/schemas/Query'
        id:
          type: integer
          example: 1024
          description: Identifier
      title: Search
      example:
        query:
          type: boolean
          filter_set: null
          case_sensitivity: false
          boolean: Tesla OR (Volvo NEAR electric)
        name: Electric cars
      description: Search
      additionalProperties: false
    Tag:
      required:
      - id
      - name
      type: object
      properties:
        id:
          type: integer
          description: Tag id
          example: 12345
        name:
          type: string
          description: Tag name
          example: My Custom Tag
      title: Tag
      example:
        id: 12345
        name: My Custom Tag
      description: Tag
      additionalProperties: false
    TagList:
      type: object
      properties:
