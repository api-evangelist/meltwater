  /v3/custom_categories:
    get:
      tags:
      - Listening Search Management
      summary: Get a list of all search custom categories
      operationId: list_custom_categories
      parameters:
      - name: company_id
        in: query
        description: Company which owns the given custom categories. If not specified your default company is used.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: List of Custom Categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomCategoriesList'
              example:
                count: 2
                custom_categories:
                - id: 123
                  name: Japanese cars
                  type: include
                - id: 456
                  name: German cars
                  type: exclude
        '401':
          description: ''
          content:
