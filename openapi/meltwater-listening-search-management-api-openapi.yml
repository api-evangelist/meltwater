          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
      security:
      - apikey: []
      description: ''
  /v3/tags:
    get:
      tags:
      - Listening Search Management
      summary: Get a list of all your tags
      operationId: list_tags
      parameters:
      - name: company_id
        in: query
        description: Company which owns the given tags. If not specified your default company is used.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: List of Tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagList'
              example:
                tags:
                - id: 123456
                  name: my tag
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '422':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
      security:
      - apikey: []
      description: ''
    post:
      tags:
      - Listening Search Management
      summary: Create a new tag
      description: Create a new tag for tagging documents. Tag names must be unique and a maximum of 128 characters.
      parameters:
      - name: company_id
        in: query
        description: Company which will own the new tag. If not specified, your default company is used.
        schema:
          type: string
      requestBody:
        description: Tag
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTagRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTagResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
      security:
      - apikey: []
  /v3/tags/{tag_id}:
    delete:
      tags:
      - Listening Search Management
      summary: Delete an existing tag.
      description: Deletes a given tag. Any documents that possess this tag will have it removed following tag deletion.
      parameters:
      - name: tag_id
        in: path
        description: Tag ID
        required: true
        schema:
          type: integer
      - name: company_id
        in: query
        description: Company which owns the tag to be deleted. If not specified, your default company is used.
        schema:
          type: string
      responses:
        '204':
          description: No Content
          content: {}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
