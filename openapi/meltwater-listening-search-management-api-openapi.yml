      - name: expand_combined
        in: query
        description: For combined searches, show whether the ids belongs to a search, filter set or custom category
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: A single Search
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleSearch'
              examples:
                Boolean Search:
                  summary: Boolean Search with a Query
                  value:
                    search:
                      updated: '2020-08-23T08:25:56Z'
                      id: 1024
                      name: Electric Cars
                      query:
                        filter_set: null
                        case_sensitivity: 'no'
                        boolean: Tesla OR (Volvo NEAR electric)
                        type: boolean
                Boolean Search with hidden Query:
                  summary: Boolean Search with hidden Query
                  value:
                    search:
                      updated: '2020-08-23T08:25:56Z'
                      id: 1025
                      name: Electric Cars
                Keyword Search:
                  summary: Keyword Search with a Query
                  value:
                    search:
                      updated: '2020-08-23T08:25:56Z'
                      id: 1026
                      name: Pokemon
                      query:
                        filter_set:
                          id: 123456
                          name: my filter set
                          subtype: custom
                          type: saved
                        case_sensitivity: 'no'
                        not_keywords: []
                        any_keywords:
                        - Pokemon
                        - Pokémon
                        all_keywords: []
                        type: keyword
                Keyword Search No Query:
                  summary: Keyword Search with hidden Query
                  value:
                    search:
                      updated: '2020-08-23T08:25:56Z'
                      id: 1027
                      name: Pokemon
                Combined Search:
                  summary: Combined Search with a Query
                  value:
                    search:
                      updated: '2020-08-23T08:25:56.000Z'
                      id: 1028
                      name: Meltwater Combined
                      query:
                        filter_set: null
                        case_sensitivity: false
                        not_searches: []
                        any_searches: []
                        all_searches:
                        - 1
                Combined Search No Query:
                  summary: Combined Search with hidden Query
                  value:
                    search:
                      updated: '2020-03-25T00:00:00Z'
                      id: 1028
                      name: Meltwater Combined
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '401':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '403':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '409':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '422':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
      security:
      - apikey: []
      description: ''
    put:
      tags:
      - Listening Search Management
      summary: Update an individual search
      operationId: update_search
      parameters:
      - name: id
        in: path
        description: Search id
        required: true
        schema:
          type: integer
          format: int64
        example: 1234
      - name: company_id
        in: query
        description: Company which owns the given search. If not specified your default company is used.
        required: false
        schema:
          type: string
      requestBody:
        description: A single search request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SingleSearchRequest'
            examples:
              Keyword Search:
                summary: Keyword Search
                value:
                  search:
                    name: Keyword Search
                    query:
                      filter_set: null
                      case_sensitivity: false
                      not_keywords:
                      - Tesla
                      any_keywords:
                      - Twitter
                      all_keywords:
                      - Musk
                      type: keyword
              Boolean Search:
                summary: Boolean Search
                value:
                  search:
                    name: Boolean Search
                    query:
                      filter_set:
                        id: 123456
                        name: my filter set
                        subtype: custom
                        type: saved
                      case_sensitivity: 'yes'
                      boolean: Tesla OR (Volvo NEAR electric)
                      type: boolean
              Combined Search:
                summary: Combined Search
                value:
                  search:
                    name: Combined Search
                    query:
                      filter_set:
                        id: 123
                        type: saved
                      not_searches:
                      - 1
                      any_searches:
                      - 2
                      all_searches:
                      - 3
                      type: combined
        required: true
      responses:
        '200':
          description: A single Search
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleSearch'
              examples:
                Boolean Search:
                  summary: Boolean Search
                  value:
                    search:
                      updated: '2020-08-23T08:25:56Z'
                      id: 1025
                      name: Electric Cars
                      query:
                        filter_set: null
                        case_sensitivity: false
                        boolean: cars AND electric
                Keyword Search:
                  summary: Keyword Search
                  value:
                    search:
                      updated: '2020-08-23T08:25:56Z'
                      id: 1026
                      name: Pokemon
                      query:
                        filter_set:
                          id: 123456
                          name: my filter set
                          subtype: custom
                          type: saved
                        case_sensitivity: 'no'
                        not_keywords: []
                        any_keywords:
                        - Pokemon
                        - Pokémon
                        all_keywords: []
                        type: keyword
                Combined Search:
                  summary: Combined Search
                  value:
                    search:
                      updated: '2020-08-23T08:25:56.000Z'
                      id: 1028
                      name: Meltwater Combined
                      query:
                        filter_set: null
                        case_sensitivity: false
                        not_searches: []
                        any_searches: []
                        all_searches:
                        - 1
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
        '400':
          description: ''
          content:
            application/json:
              schema:
