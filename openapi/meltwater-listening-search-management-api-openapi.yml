              schema:
                $ref: '#/components/schemas/Errors'
        '503':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Errors'
      security:
      - apikey: []
      description: ''
    delete:
      tags:
      - Listening Search Management
      summary: Delete an individual search
      operationId: delete_search
      parameters:
      - name: id
        in: path
        description: Search id
        required: true
        schema:
          type: integer
          format: int64
        example: 1234
      - name: company_id
        in: query
        description: Company which owns the given search. If not specified your default company is used.
        required: false
        schema:
          type: string
      responses:
        '204':
          description: ''
        '404':
          description: ''
